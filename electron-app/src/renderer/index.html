<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content-Security-Policy: tightened for Electron.
      - default-src 'self'          : Only load resources from the same origin.
      - script-src 'self'           : No inline scripts; Vite injects its own nonce in dev.
      - style-src  'self' 'unsafe-inline' : Allow inline styles (React/Vite need this in dev).
      - img-src    'self' data:     : Allow data URIs for icons.
      - connect-src 'self' ws:      : Allow Vite HMR websocket in development.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self';
        style-src   'self' 'unsafe-inline';
        img-src     'self' data:;
        connect-src 'self' ws://localhost:5173;
      "
    />
    <title>MyTracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
